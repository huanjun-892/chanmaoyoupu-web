<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <!-- 厨师帽 - 两个圆凸（艹字形），完整不被裁切 -->
  <ellipse cx="72" cy="28" rx="22" ry="20" fill="white" stroke="#FF8C42" stroke-width="2.5"/>
  <ellipse cx="108" cy="28" rx="22" ry="20" fill="white" stroke="#FF8C42" stroke-width="2.5"/>
  <!-- 帽身 -->
  <path d="M50,44 C50,44 44,46 44,66 L44,90 L136,90 L136,66 C136,46 130,44 130,44" fill="white" stroke="#FF8C42" stroke-width="2.5"/>
  <!-- 帽身褶皱线 -->
  <path d="M72,48 C70,60 70,76 72,90" fill="none" stroke="#FFE0C4" stroke-width="1"/>
  <path d="M108,48 C110,60 110,76 108,90" fill="none" stroke="#FFE0C4" stroke-width="1"/>
  <!-- 帽檐 -->
  <rect x="40" y="86" width="100" height="12" rx="4" fill="white" stroke="#FF8C42" stroke-width="2.5"/>

  <!-- 猫头 - 正面偏右 -->
  <ellipse cx="90" cy="170" rx="52" ry="48" fill="#FFB870" stroke="#FF8C42" stroke-width="2.5"/>

  <!-- 左耳 -->
  <path d="M50,138 L32,86 L76,126 Z" fill="#FFB870" stroke="#FF8C42" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M52,132 L40,94 L70,122 Z" fill="#FFDEC4"/>
  <!-- 右耳 -->
  <path d="M130,138 L148,86 L104,126 Z" fill="#FFB870" stroke="#FF8C42" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M128,132 L140,94 L110,122 Z" fill="#FFDEC4"/>

  <!-- 白色口鼻区域 -->
  <ellipse cx="90" cy="182" rx="32" ry="26" fill="white"/>

  <!-- 左眼（眯眼弧线） -->
  <path d="M68,160 Q76,148 86,160" stroke="#FF8C42" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- 右眼（眯眼弧线） -->
  <path d="M94,160 Q104,148 114,160" stroke="#FF8C42" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- 鼻子 -->
  <ellipse cx="90" cy="172" rx="5" ry="4" fill="#FF8C42"/>

  <!-- 嘴巴 -->
  <path d="M82,180 Q90,190 98,180" stroke="#FF8C42" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- 左侧胡须 - 3根 -->
  <line x1="64" y1="168" x2="22" y2="160" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="62" y1="176" x2="18" y2="176" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="64" y1="184" x2="22" y2="192" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 右侧胡须 - 3根 -->
  <line x1="116" y1="168" x2="158" y2="160" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="118" y1="176" x2="162" y2="176" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="116" y1="184" x2="158" y2="192" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 身体（底部露出） -->
  <ellipse cx="90" cy="234" rx="46" ry="26" fill="#FFB870" stroke="#FF8C42" stroke-width="2.5"/>
  <!-- 胸口白色 -->
  <ellipse cx="90" cy="230" rx="22" ry="16" fill="white"/>
</svg>
