<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- 极简线描橘猫Logo：眯眼微笑+厨师帽+捂嘴爪 -->
  <!-- 猫头 -->
  <ellipse cx="60" cy="72" rx="34" ry="30" fill="#FFF5EB" stroke="#FF8C42" stroke-width="2.5"/>
  <!-- 左耳 -->
  <path d="M32 55 L24 22 L48 46 Z" fill="#FFF5EB" stroke="#FF8C42" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 右耳 -->
  <path d="M88 55 L96 22 L72 46 Z" fill="#FFF5EB" stroke="#FF8C42" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 耳内 -->
  <path d="M34 52 L29 30 L46 47 Z" fill="#FFDEC4"/>
  <path d="M86 52 L91 30 L74 47 Z" fill="#FFDEC4"/>
  <!-- 眯眼微笑 -->
  <path d="M44 68 Q49 63 54 68" stroke="#FF8C42" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M66 68 Q71 63 76 68" stroke="#FF8C42" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 鼻子 -->
  <ellipse cx="60" cy="77" rx="3" ry="2" fill="#FF8C42"/>
  <!-- 嘴 -->
  <path d="M55 81 Q60 85 65 81" stroke="#FF8C42" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- 胡须 -->
  <line x1="20" y1="74" x2="42" y2="76" stroke="#FF8C42" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="80" x2="42" y2="80" stroke="#FF8C42" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="78" y1="76" x2="100" y2="74" stroke="#FF8C42" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="78" y1="80" x2="100" y2="80" stroke="#FF8C42" stroke-width="1.2" stroke-linecap="round"/>
  <!-- 腮红 -->
  <circle cx="42" cy="78" r="6" fill="#FFB88C" opacity="0.3"/>
  <circle cx="78" cy="78" r="6" fill="#FFB88C" opacity="0.3"/>
  <!-- 厨师帽 -->
  <rect x="40" y="34" width="40" height="10" rx="2" fill="white" stroke="#FF8C42" stroke-width="2"/>
  <path d="M38 44 Q38 20 60 20 Q82 20 82 44" fill="white" stroke="#FF8C42" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 捂嘴小爪 -->
  <ellipse cx="80" cy="72" rx="10" ry="8" fill="#FFF5EB" stroke="#FF8C42" stroke-width="2" transform="rotate(-15 80 72)"/>
  <path d="M74 66 Q76 62 78 66" stroke="#FF8C42" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M79 64 Q81 60 83 64" stroke="#FF8C42" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
