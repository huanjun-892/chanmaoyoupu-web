<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 180" fill="none">
  <!-- 厨师帽 - 高大醒目版 -->
  <!-- 帽身 -->
  <path d="M28,72 C28,72 24,16 44,8 C54,4 62,14 70,8 C78,2 88,12 98,8 C118,2 112,72 112,72 Z" fill="white" stroke="#FF8C42" stroke-width="2"/>
  <!-- 帽褶 -->
  <path d="M50,14 C48,34 50,56 50,72" fill="none" stroke="#FFE0C4" stroke-width="0.8"/>
  <path d="M70,10 C70,32 70,56 70,72" fill="none" stroke="#FFE0C4" stroke-width="0.8"/>
  <path d="M90,14 C92,34 90,56 90,72" fill="none" stroke="#FFE0C4" stroke-width="0.8"/>
  <!-- 帽檐 -->
  <rect x="26" y="70" width="88" height="10" rx="2" fill="white" stroke="#FF8C42" stroke-width="2"/>
  
  <!-- 猫头 -->
  <ellipse cx="70" cy="118" rx="42" ry="38" fill="#FFF5EB" stroke="#FF8C42" stroke-width="2.5"/>
  
  <!-- 左耳 -->
  <path d="M36,94 L24,56 L54,86 Z" fill="#FFF5EB" stroke="#FF8C42" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M38,90 L30,64 L50,86 Z" fill="#FFDEC4"/>
  
  <!-- 右耳 -->
  <path d="M104,94 L116,56 L86,86 Z" fill="#FFF5EB" stroke="#FF8C42" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M102,90 L110,64 L90,86 Z" fill="#FFDEC4"/>
  
  <!-- 脸部浅色区域 -->
  <ellipse cx="70" cy="128" rx="30" ry="24" fill="#FFDEC4"/>
  
  <!-- 眯眼微笑 -->
  <path d="M52,114 Q58,107 64,114" stroke="#FF8C42" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M76,114 Q82,107 88,114" stroke="#FF8C42" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- 鼻子 -->
  <ellipse cx="70" cy="124" rx="4" ry="3" fill="#FF8C42"/>
  
  <!-- 嘴 -->
  <path d="M62,130 Q70,138 78,130" stroke="#FF8C42" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- 胡须 -->
  <line x1="40" y1="118" x2="16" y2="114" stroke="#FF8C42" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="40" y1="124" x2="14" y2="124" stroke="#FF8C42" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="40" y1="130" x2="16" y2="134" stroke="#FF8C42" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="100" y1="118" x2="124" y2="114" stroke="#FF8C42" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="100" y1="124" x2="126" y2="124" stroke="#FF8C42" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="124" y2="134" stroke="#FF8C42" stroke-width="1.3" stroke-linecap="round"/>
  
  <!-- 腮红 -->
  <circle cx="50" cy="128" r="7" fill="#FFB88C" opacity="0.35"/>
  <circle cx="90" cy="128" r="7" fill="#FFB88C" opacity="0.35"/>
  
  <!-- 捂嘴小爪 -->
  <ellipse cx="100" cy="120" rx="10" ry="8" fill="#FFF5EB" stroke="#FF8C42" stroke-width="2" transform="rotate(-15 100 120)"/>
  <path d="M94,114 Q96,110 98,114" stroke="#FF8C42" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M99,112 Q101,108 103,112" stroke="#FF8C42" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
