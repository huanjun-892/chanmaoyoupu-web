<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- 厨师帽 - 蓬松高大版 -->
  <!-- 帽身主体 -->
  <path d="M40,88 C40,88 32,24 56,12 C66,6 76,18 88,10 C100,2 112,16 124,10 C148,2 144,88 144,88 Z" fill="white" stroke="#FF8C42" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 帽子褶皱 -->
  <path d="M68,18 C66,40 68,64 68,88" fill="none" stroke="#FFE0C4" stroke-width="1"/>
  <path d="M92,14 C92,36 92,62 92,88" fill="none" stroke="#FFE0C4" stroke-width="1"/>
  <path d="M116,18 C118,40 116,64 116,88" fill="none" stroke="#FFE0C4" stroke-width="1"/>
  <!-- 帽檐 -->
  <rect x="36" y="84" width="112" height="12" rx="3" fill="white" stroke="#FF8C42" stroke-width="2.5"/>
  
  <!-- 猫头 -->
  <ellipse cx="100" cy="156" rx="52" ry="46" fill="#FFF5EB" stroke="#FF8C42" stroke-width="2.5"/>
  
  <!-- 左耳 -->
  <path d="M58,126 L40,74 L82,114 Z" fill="#FFF5EB" stroke="#FF8C42" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M60,120 L48,82 L78,112 Z" fill="#FFDEC4"/>
  
  <!-- 右耳 -->
  <path d="M142,126 L160,74 L118,114 Z" fill="#FFF5EB" stroke="#FF8C42" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M140,120 L152,82 L122,112 Z" fill="#FFDEC4"/>
  
  <!-- 脸部浅色区域 -->
  <ellipse cx="100" cy="168" rx="38" ry="30" fill="#FFDEC4"/>
  
  <!-- 眯眼微笑（弯弯的弧线） -->
  <path d="M76,148 Q84,138 92,148" stroke="#FF8C42" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M108,148 Q116,138 124,148" stroke="#FF8C42" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 鼻子 -->
  <ellipse cx="100" cy="160" rx="5" ry="4" fill="#FF8C42"/>
  
  <!-- 嘴巴（微笑弧线） -->
  <path d="M90,168 Q100,178 110,168" stroke="#FF8C42" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  
  <!-- 胡须 -->
  <line x1="64" y1="152" x2="32" y2="146" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="64" y1="160" x2="30" y2="160" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="64" y1="168" x2="32" y2="174" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="136" y1="152" x2="168" y2="146" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="136" y1="160" x2="170" y2="160" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="136" y1="168" x2="168" y2="174" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 腮红 -->
  <circle cx="76" cy="166" r="9" fill="#FFB88C" opacity="0.3"/>
  <circle cx="124" cy="166" r="9" fill="#FFB88C" opacity="0.3"/>
  
  <!-- 小爪子（右侧） -->
  <ellipse cx="146" cy="150" rx="12" ry="10" fill="#FFF5EB" stroke="#FF8C42" stroke-width="2" transform="rotate(-15 146 150)"/>
  <path d="M140,143 Q142,138 144,143" stroke="#FF8C42" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M146,141 Q148,136 150,141" stroke="#FF8C42" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
